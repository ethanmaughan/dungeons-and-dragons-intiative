<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}D&D Initiative{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body {
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
        }
        .parchment {
            background-color: #2a2a3e;
            border: 1px solid #3a3a5e;
        }
        .gold-text {
            color: #d4a843;
        }
        .narrative-text {
            line-height: 1.8;
        }
        .action-input {
            background-color: #2a2a3e;
            border: 1px solid #3a3a5e;
            color: #e0e0e0;
        }
        .action-input:focus {
            border-color: #d4a843;
            outline: none;
            box-shadow: 0 0 0 2px rgba(212, 168, 67, 0.3);
        }
        .btn-action {
            background-color: #8b0000;
            color: #e0e0e0;
            transition: background-color 0.2s;
        }
        .btn-action:hover {
            background-color: #a50000;
        }
        .btn-action:disabled {
            background-color: #4a4a4a;
            cursor: wait;
        }
        .btn-secondary {
            background-color: #3a3a5e;
            color: #e0e0e0;
            transition: background-color 0.2s;
        }
        .btn-secondary:hover {
            background-color: #4a4a6e;
        }
        .player-action {
            color: #7eb8da;
            font-style: italic;
        }
        .dm-narration {
            color: #e0d5c0;
        }
        #narrative-panel {
            scroll-behavior: smooth;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen">
    <!-- Nav Bar -->
    <nav class="px-4 py-2 flex items-center justify-between border-b border-gray-800 text-sm">
        <a href="/" class="gold-text font-bold text-lg">D&D Initiative</a>
        <div class="flex items-center gap-4">
            {% if player %}
                <span class="text-gray-400">{{ player.display_name }}</span>
                <a href="/dashboard" class="text-gray-300 hover:text-white">Dashboard</a>
                <a href="/auth/logout" class="text-gray-400 hover:text-red-400">Logout</a>
            {% else %}
                <a href="/login" class="text-gray-300 hover:text-white">Login</a>
                <a href="/register" class="gold-text hover:underline">Register</a>
            {% endif %}
        </div>
    </nav>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
