{% extends "base.html" %}

{% block title %}Account — Foray{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-3xl gold-text font-bold mb-8">Account</h1>

    <!-- Account Info -->
    <div class="parchment rounded-lg p-6 mb-6">
        <h2 class="text-lg gold-text font-bold mb-4">Profile</h2>
        <div class="space-y-3 text-sm">
            <div class="flex justify-between">
                <span class="text-gray-400">Username</span>
                <span>{{ player.username }}</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-400">Display Name</span>
                <span>{{ player.display_name }}</span>
            </div>
        </div>
    </div>

    <!-- Email -->
    <div class="parchment rounded-lg p-6">
        <h2 class="text-lg gold-text font-bold mb-4">Email</h2>
        <form action="/account/email" method="post" class="flex gap-3">
            <input type="email" name="email" value="{{ player.email or '' }}"
                   class="action-input flex-1 rounded px-3 py-2 text-sm"
                   placeholder="your@email.com">
            <button type="submit" class="btn-secondary rounded px-4 py-2 text-sm">
                Update
            </button>
        </form>
        <p class="text-gray-500 text-xs mt-2">Used for billing receipts and account recovery.</p>
    </div>
</div>
{% endblock %}
