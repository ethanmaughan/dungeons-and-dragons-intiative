{% if log.action_text %}
<div class="player-action narrative-text pl-4 border-l-2 border-blue-800">
    <span class="text-blue-400 text-sm font-bold">{{ log.actor }}</span>
    <p class="mt-1">{{ log.action_text }}</p>
</div>
{% endif %}

{% if log.narration_text %}
<div class="dm-narration narrative-text pl-4 border-l-2 border-yellow-800">
    <span class="gold-text text-sm font-bold">Game Master</span>
    <div class="mt-1 whitespace-pre-wrap">{{ log.narration_text }}</div>
</div>
{% endif %}
